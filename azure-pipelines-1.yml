trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'aravindhjv/dotnet-demo'

steps:

- task: Docker@2
  displayName: Build and Push Docker Image
  inputs:
    containerRegistry: 'dockerhub-connection'
    repository: '$(imageName)'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: |
      latest